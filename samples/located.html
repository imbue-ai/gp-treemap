<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gp-treemap · located nodes</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; background:#fafafa; color:#111; }
  header { padding: 10px 14px; border-bottom: 1px solid #0002; display: flex; gap: 12px; align-items: center; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header a { margin-left: auto; color: #0645ad; text-decoration: none; font-size: 13px; }
  gp-treemap { display: flex; height: calc(100vh - 47px); }
  .pick { display: flex; gap: 4px; align-items: center; }
  .pick input { font: inherit; padding: 2px 6px; width: 260px; border: 1px solid #0003; border-radius: 4px; }
  .pick button { padding: 2px 8px; }
</style>
</head>
<body>
<header>
  <h1>locateNode — search &amp; highlight</h1>
  <div class="pick">
    <input id="q" type="text" placeholder="try: shot.raw or lodash" value="shot.raw">
    <button id="go">locate</button>
  </div>
  <a href="index.html">← all samples</a>
</header>
<gp-treemap id="tm"
  color-mode="categorical"
  palette="gp-default"
  value-format="b"
  min-cell-area="40"></gp-treemap>
<script src="../dist/gp-treemap.bundle.js"></script>
<script src="data/filesystem.js"></script>
<script>
(function () {
  var d = window.__data.flattenFilesystem();
  var tm = document.getElementById('tm');
  tm.labels = d.labels; tm.parents = d.parents; tm.values = d.values;
  tm.ids = d.ids; tm.color = d.color;
  function locateByLabel(q) {
    for (var i = 0; i < d.labels.length; i++) {
      if (d.labels[i].toLowerCase().indexOf(q.toLowerCase()) >= 0) {
        tm.locatedNodeIds = [d.ids[i]];
        tm.zoomReset();
        return;
      }
    }
  }
  document.getElementById('go').addEventListener('click', function () { locateByLabel(document.getElementById('q').value); });
  setTimeout(function () { locateByLabel(document.getElementById('q').value); }, 50);
})();
</script>
</body>
</html>
