<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>raised-treemap · min cell area</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; background:#fafafa; color:#111; }
  header { padding: 10px 14px; border-bottom: 1px solid #0002; display: flex; gap: 12px; align-items: center; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header a { margin-left: auto; color: #0645ad; text-decoration: none; font-size: 13px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 47px); gap: 1px; background: #0002; }
  .cell { display: flex; flex-direction: column; background: #fafafa; min-width: 0; }
  .cell h2 { margin: 0; padding: 6px 10px; font-size: 13px; font-weight: 600; color: #444; background: #eee; border-bottom: 1px solid #0001; }
  raised-treemap { flex: 1; display: flex; min-height: 0; }
</style>
</head>
<body>
<header>
  <h1>minCellArea — 4 vs 400 px² (deep hierarchy)</h1>
  <a href="index.html">← all samples</a>
</header>
<div class="row">
  <div class="cell"><h2>minCellArea = 4</h2><raised-treemap id="a" min-cell-area="4"></raised-treemap></div>
  <div class="cell"><h2>minCellArea = 400</h2><raised-treemap id="b" min-cell-area="400"></raised-treemap></div>
</div>
<script src="../dist/raised-treemap.bundle.js"></script>
<script src="data/deephier.js"></script>
<script>
(function () {
  var d = window.__data.flattenDeepHier();
  ['a','b'].forEach(function (id) {
    var tm = document.getElementById(id);
    tm.labels = d.labels; tm.parents = d.parents; tm.values = d.values; tm.ids = d.ids;
    tm.color = d.ids.map(function (x) { var p = x.split('/'); return p[3] || p[2] || p[1] || 'root'; });
    tm.colorMode = 'categorical';
    tm.palette = 'rainbow';
    tm.gradientIntensity = 0.6;
    tm.toolbar = false;
  });
})();
</script>
</body>
</html>
