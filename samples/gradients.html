<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gp-treemap · gradient intensities</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; background:#fafafa; color:#111; }
  header { padding: 10px 14px; border-bottom: 1px solid #0002; display: flex; gap: 12px; align-items: center; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header a { margin-left: auto; color: #0645ad; text-decoration: none; font-size: 13px; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; height: calc(100vh - 47px); gap: 1px; background: #0002; }
  .cell { display: flex; flex-direction: column; background: #fafafa; min-width: 0; }
  .cell h2 { margin: 0; padding: 6px 10px; font-size: 13px; font-weight: 600; color: #444; background: #eee; border-bottom: 1px solid #0001; }
  gp-treemap { flex: 1; display: flex; min-height: 0; }
</style>
</head>
<body>
<header>
  <h1>gradient intensity — 0 (flat) / 0.5 (default) / 1 (max)</h1>
  <a href="index.html">← all samples</a>
</header>
<div class="row">
  <div class="cell"><h2>gradientIntensity = 0</h2><gp-treemap id="a" gradient-intensity="0" min-cell-area="40"></gp-treemap></div>
  <div class="cell"><h2>gradientIntensity = 0.5</h2><gp-treemap id="b" gradient-intensity="0.5" min-cell-area="40"></gp-treemap></div>
  <div class="cell"><h2>gradientIntensity = 1</h2><gp-treemap id="c" gradient-intensity="1" min-cell-area="40"></gp-treemap></div>
</div>

<script src="../dist/gp-treemap.bundle.js"></script>
<script src="data/filesystem.js"></script>
<script>
(function () {
  var d = window.__data.flattenFilesystem();
  ['a','b','c'].forEach(function (id) {
    var tm = document.getElementById(id);
    tm.labels = d.labels; tm.parents = d.parents; tm.values = d.values;
    tm.ids = d.ids; tm.color = d.color;
    tm.colorMode = 'categorical';
    tm.toolbar = false;
  });
})();
</script>
</body>
</html>
