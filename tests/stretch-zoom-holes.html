<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>stretch-zoom holes fixture</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  raised-treemap { display: flex; width: 100%; height: 100%; }
</style>
</head>
<body>
<raised-treemap id="tm"
  color-mode="categorical"
  palette="gp-default"
  gradient-intensity="0.5"></raised-treemap>

<script src="../dist/raised-treemap.bundle.js"></script>
<script>
// Build a tree designed to trigger the stretch-zoom "holes" bug.
//
// Bug: stretch zoom lays out children at the original node aspect ratio (very
// narrow), then scales the rects to fill the canvas. The visible() check in
// layoutTree drops sub-pixel cells BEFORE the stretch-scale is applied, but
// some of those cells would be fine in a regular (non-stretch) zoom.
//
// Structure:
//   root (row 0)
//     ├── bigDir (row 1, value 0 — aggregated from children)
//     │   └── bigFile_0..bigFile_N (huge files making bigDir dominate)
//     └── narrow (row 2, value 0 — the zoom target)
//         ├── narrowBig (row 3, a large file)
//         └── tiny_0..tiny_M (many small files)
//
// By making bigDir vastly larger than narrow, the "narrow" node gets an
// extremely thin vertical strip in the root view. When stretch-zoomed,
// the layout space is only a few pixels wide, causing some cells to have
// sub-pixel rects that visible() drops.
(function () {
  var tm = document.getElementById('tm');

  // Use parentIndices (fast path, matching scan-generated data).
  var labels = [];
  var parentIndices = [];
  var values = [];
  var color = [];

  // Row 0: root
  labels.push('root');
  parentIndices.push(-1);
  values.push(0);
  color.push('dir');

  // Row 1: bigDir
  labels.push('bigDir');
  parentIndices.push(0);
  values.push(0);
  color.push('dir');

  // Row 2: narrow (the stretch-zoom target)
  labels.push('narrow');
  parentIndices.push(0);
  values.push(0);
  color.push('dir');

  // Big files under bigDir (rows 3..52): make bigDir ~99.8% of root.
  // 50 files of 200000 each = 10,000,000 total
  for (var i = 0; i < 50; i++) {
    labels.push('bigFile_' + i);
    parentIndices.push(1); // parent = bigDir
    values.push(200000);
    color.push('code');
  }

  // Row 53: narrowBig (one large file under narrow)
  labels.push('narrowBig');
  parentIndices.push(2); // parent = narrow
  values.push(5000);
  color.push('doc');

  // Tiny files under narrow (rows 54..253): 200 files with varied sizes.
  // Sizes range from 100 down to 1, ensuring diverse balanced-tree structure.
  for (var j = 0; j < 200; j++) {
    var size = Math.max(1, Math.round(100 * Math.exp(-j * 0.05)));
    labels.push('tiny_' + j);
    parentIndices.push(2); // parent = narrow
    values.push(size);
    color.push('doc');
  }

  tm.labels = labels;
  tm.parentIndices = Int32Array.from(parentIndices);
  tm.values = values;
  tm.color = color;
})();
</script>
</body>
</html>
